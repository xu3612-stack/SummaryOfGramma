<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>大家的日语文型音频播放器 V3.2</title><style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#0f172a;color:#f8fafc;-webkit-text-size-adjust:100%}header{position:sticky;top:0;background:#111827;border-bottom:1px solid #334155;padding:14px 16px;z-index:2}h1{font-size:20px;margin:0 0 6px}.sub{color:#cbd5e1;font-size:13px}main{display:grid;grid-template-columns:330px 1fr;gap:14px;padding:14px}.panel{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}button,select{border:1px solid #334155;border-radius:12px;background:#0b1220;color:#f8fafc;padding:12px;font-size:16px;min-height:44px}button{cursor:pointer;font-weight:650}.primary{background:#38bdf8;color:#00111f;border:0}.good{background:#22c55e;color:#02130a;border:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.lessons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:55vh;overflow:auto}.active{outline:2px solid #38bdf8;background:#083344!important}.now{border-left:4px solid #38bdf8;background:#0b1220;border-radius:12px;padding:12px;margin-bottom:12px}.nowTitle{font-weight:700;margin-bottom:6px}.nowText{white-space:pre-wrap;line-height:1.65;color:#e2e8f0}.nodes{display:flex;flex-direction:column;gap:8px;max-height:68vh;overflow:auto}.node{text-align:left;line-height:1.55;background:#1f2937}.meta{color:#38bdf8;font-size:12px;margin-bottom:4px}.barBox{height:8px;background:#020617;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:#38bdf8}.status{color:#facc15}.warn{color:#fca5a5}@media(max-width:850px){header{padding:12px}h1{font-size:18px}main{grid-template-columns:1fr;padding:10px}.lessons{grid-template-columns:repeat(4,1fr);max-height:220px}.grid{grid-template-columns:repeat(2,1fr)}.nodes{max-height:none}}
</style></head><body><header><h1>大家的日语文型音频播放器 V3.2</h1><div class="sub">前5课中文教学版｜结构化讲解｜手机兼容｜适合开车复习</div></header><main><section class="panel"><div class="row"><label>课程</label><select id="lesson"></select></div><div class="row"><label>范围</label><select id="range"><option value="lesson">当前课</option><option value="from">从当前位置一直播放</option><option value="all">全部课程</option></select></div><div class="row"><label>语速</label><select id="rate"><option value=".75">0.75x</option><option value=".9" selected>0.9x</option><option value="1">1.0x</option><option value="1.15">1.15x</option></select><label>停顿</label><select id="pause"><option value="600">0.6秒</option><option value="1200" selected>1.2秒</option><option value="2000">2秒</option></select></div><div class="grid"><button class="good" id="play">播放</button><button id="pauseBtn">暂停/继续</button><button id="stop">停止</button><button id="prev">上一条</button><button class="primary" id="next">下一条</button><button id="repeat">重播</button></div><p class="sub" id="stats"></p><p class="sub status" id="loadStatus">正在加载课程数据……</p><p class="sub" id="mobileHint">手机端请先点“播放”一次以激活系统语音。</p><div class="barBox"><div id="bar" class="bar"></div></div><hr style="border-color:#334155"><div id="lessons" class="lessons"></div></section><section class="panel"><div class="now"><div id="nowTitle" class="nowTitle"></div><div id="nowText" class="nowText"></div></div><div id="nodes" class="nodes"></div></section></main><script src="data.js?v=3.2"></script><script>
var lessons=[],li=0,ni=0,q=[],qp=0,playing=false,timer=null,voiceReady=false;
function $(id){return document.getElementById(id)}
async function loadLessons(){try{var m=await fetch('lessons/manifest.json?v='+Date.now(),{cache:'no-store'});if(!m.ok)throw new Error('manifest not found');var manifest=await m.json();var loaded=[];for(var i=0;i<manifest.files.length;i++){var f=manifest.files[i];var r=await fetch('lessons/'+f+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(f+' not found');var chunk=await r.json();loaded=loaded.concat(chunk)}lessons=loaded.sort(function(a,b){return a.lesson-b.lesson});$('loadStatus').textContent='已加载模块化课程数据：'+lessons.length+'课。'}catch(e){lessons=window.LESSONS||[{lesson:1,title:'第1课',nodes:(window.data||[]).map(function(x,i){return{title:'节点'+(i+1),text:x.text}})}];$('loadStatus').textContent='当前使用内置备用数据；模块化数据文件尚未完全接入。'}}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]})}
function displayText(n){return n.text||((n.audioParts||[]).map(function(p){return p.text}).join('\n'))}
function partsFor(n){if(n.audioParts&&n.audioParts.length)return n.audioParts;return chunks(displayText(n)).map(function(t){return{lang:pickLang(t),text:t}})}
function pickLang(s){s=String(s||'');var kana=(s.match(/[ぁ-んァ-ン]/g)||[]).length,han=(s.match(/[\u4e00-\u9fff]/g)||[]).length;return kana>0&&kana>=han?'ja-JP':'zh-CN'}
function clean(s){return String(s||'').replace(/[•·*]/g,'。').replace(/\s+/g,' ').trim()}
function chunks(s){var t=clean(s),out=[],buf='';for(var i=0;i<t.length;i++){var ch=t.charAt(i);buf+=ch;if('。！？!?'.indexOf(ch)>=0){if(buf.trim())out.push(buf.trim());buf=''}}if(buf.trim())out.push(buf.trim());return out.length?out:[t]}
function unlockVoice(){if(voiceReady)return;try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance('');u.volume=0;u.lang='ja-JP';speechSynthesis.speak(u);voiceReady=true;$('mobileHint').textContent='语音已激活。'}catch(e){$('mobileHint').textContent='当前浏览器可能限制语音播放，请用 Safari/Chrome 打开。';$('mobileHint').className='sub warn'}}
function init(){if(!lessons.length){$('loadStatus').textContent='没有课程数据。';return}$('lesson').innerHTML='';$('lessons').innerHTML='';lessons.forEach(function(l,i){var o=document.createElement('option');o.value=i;o.textContent='第'+l.lesson+'课（'+l.nodes.length+'节点）';$('lesson').appendChild(o);var b=document.createElement('button');b.textContent='第'+l.lesson+'课';b.onclick=function(){sel(i,0)};$('lessons').appendChild(b)});$('lesson').onchange=function(){sel(+$('lesson').value,0)};$('play').onclick=function(){unlockVoice();play()};$('pauseBtn').onclick=pauser;$('stop').onclick=stop;$('next').onclick=next;$('prev').onclick=prev;$('repeat').onclick=function(){unlockVoice();repeat()};sel(0,0)}
function sel(a,b){li=a;ni=b;$('lesson').value=li;render()}
function render(){Array.prototype.slice.call($('lessons').children).forEach(function(b,i){b.classList.toggle('active',i===li)});var l=lessons[li];$('nodes').innerHTML='';l.nodes.forEach(function(n,i){var b=document.createElement('button');b.className='node';b.innerHTML='<div class="meta">第'+l.lesson+'课｜'+(i+1)+'/'+l.nodes.length+'</div><div>'+esc(displayText(n))+'</div>';b.onclick=function(){ni=i;render()};if(i===ni)b.classList.add('active');$('nodes').appendChild(b)});var n=l.nodes[ni];$('nowTitle').textContent='第'+l.lesson+'课｜'+(ni+1)+'/'+l.nodes.length+'｜'+(n.title||'');$('nowText').textContent=displayText(n);$('stats').textContent='共 '+lessons.length+' 课，'+lessons.reduce(function(a,l){return a+l.nodes.length},0)+' 个节点。';bar();var a=$('nodes').children[ni];if(a&&a.scrollIntoView)a.scrollIntoView({block:'nearest'})}
function buildQ(){var r=$('range').value,out=[];if(r==='lesson'){lessons[li].nodes.forEach(function(_,i){out.push([li,i])})}else{var start=r==='from'?li:0;for(var L=start;L<lessons.length;L++){var s=(r==='from'&&L===li)?ni:0;for(var i=s;i<lessons[L].nodes.length;i++)out.push([L,i])}}return out}
function play(){speechSynthesis.cancel();q=buildQ();qp=0;playing=true;speakNow()}
function speakNow(){if(!playing||qp>=q.length){playing=false;return}li=q[qp][0];ni=q[qp][1];$('lesson').value=li;render();speakParts(partsFor(lessons[li].nodes[ni]),0,function(){if(!playing)return;qp++;timer=setTimeout(speakNow,+$('pause').value)})}
function speakParts(p,i,done){if(i>=p.length){done();return}var item=p[i];var u=new SpeechSynthesisUtterance(item.text);u.lang=item.lang||pickLang(item.text);u.rate=+$('rate').value;u.onend=function(){speakParts(p,i+1,done)};u.onerror=function(){speakParts(p,i+1,done)};speechSynthesis.speak(u)}
function pauser(){try{speechSynthesis.paused?speechSynthesis.resume():speechSynthesis.pause()}catch(e){}}
function stop(){playing=false;clearTimeout(timer);try{speechSynthesis.cancel()}catch(e){}}
function next(){stop();if(ni<lessons[li].nodes.length-1)ni++;else if(li<lessons.length-1){li++;ni=0}render()}
function prev(){stop();if(ni>0)ni--;else if(li>0){li--;ni=lessons[li].nodes.length-1}render()}
function repeat(){stop();q=[[li,ni]];qp=0;playing=true;speakNow()}
function bar(){var total=lessons.reduce(function(a,l){return a+l.nodes.length},0)||1;var done=lessons.slice(0,li).reduce(function(a,l){return a+l.nodes.length},0)+ni+1;$('bar').style.width=Math.round(done/total*100)+'%'}
loadLessons().then(init);
</script></body></html>
