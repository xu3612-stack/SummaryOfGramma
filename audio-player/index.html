<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"></head><body>
<script>
// patched loader to include structured-02
async function loadLessons(){
 try{
  const fetchJson=async p=>{let r=await fetch(p+'?v='+Date.now());return await r.json()};
  let manifest=await fetchJson('lessons/manifest.json');
  let loaded=[];
  for(let f of manifest.files){loaded=loaded.concat(await fetchJson('lessons/'+f));}
  let structuredFiles=['lessons/structured-01.json','lessons/structured-02.json'];
  let map={};
  for(let sf of structuredFiles){
    try{let data=await fetchJson(sf);data.forEach(l=>map[l.lesson]=l);}catch(e){}
  }
  loaded=loaded.filter(l=>!map[l.lesson]).concat(Object.values(map));
  lessons=loaded.sort((a,b)=>a.lesson-b.lesson);
  document.getElementById('loadStatus').textContent='已加载课程数据（含结构化6-10课）';
 }catch(e){console.error(e);}
}
</script>
</body></html>
