<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>大家的日语文型音频播放器 V3.7</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#0f172a;color:#f8fafc;-webkit-text-size-adjust:100%}header{position:sticky;top:0;background:#111827;border-bottom:1px solid #334155;padding:14px 16px;z-index:2}h1{font-size:20px;margin:0 0 6px}.sub{color:#cbd5e1;font-size:13px}.status{color:#facc15}.warn{color:#fca5a5}main{display:grid;grid-template-columns:340px 1fr;gap:14px;padding:14px}.panel{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}button,select{border:1px solid #334155;border-radius:12px;background:#0b1220;color:#f8fafc;padding:12px;font-size:16px;min-height:44px}button{cursor:pointer;font-weight:650}.primary{background:#38bdf8;color:#00111f;border:0}.good{background:#22c55e;color:#02130a;border:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.lessons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:55vh;overflow:auto}.active{outline:2px solid #38bdf8;background:#083344!important}.now{border-left:4px solid #38bdf8;background:#0b1220;border-radius:12px;padding:12px;margin-bottom:12px}.nowTitle{font-weight:700;margin-bottom:6px}.nowText{white-space:pre-wrap;line-height:1.65;color:#e2e8f0}.nodes{display:flex;flex-direction:column;gap:8px;max-height:68vh;overflow:auto}.node{text-align:left;line-height:1.55;background:#1f2937}.meta{color:#38bdf8;font-size:12px;margin-bottom:4px}.barBox{height:8px;background:#020617;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:#38bdf8}@media(max-width:850px){header{padding:12px}h1{font-size:18px}main{grid-template-columns:1fr;padding:10px}.lessons{grid-template-columns:repeat(4,1fr);max-height:220px}.grid{grid-template-columns:repeat(2,1fr)}.nodes{max-height:none}}</style></head><body><header><h1>大家的日语文型音频播放器 V3.7</h1><div class="sub">中文讲解｜日语片段自动日语朗读｜1–10课结构化</div></header><main><section class="panel"><div class="row"><label>课程</label><select id="lesson"></select></div><div class="row"><button id="play">播放</button></div><div id="lessons"></div></section><section class="panel"><div id="nodes"></div></section></main><script>async function load(){let files=['lessons/structured-01.json','lessons/structured-02.json'];let lessons=[];for(let f of files){let r=await fetch(f+'?v='+Date.now());let j=await r.json();lessons=lessons.concat(j);}lessons.sort((a,b)=>a.lesson-b.lesson);let sel=document.getElementById('lesson');let list=document.getElementById('lessons');lessons.forEach((l,i)=>{let o=document.createElement('option');o.value=i;o.textContent='第'+l.lesson+'课';sel.appendChild(o);let b=document.createElement('button');b.textContent='第'+l.lesson+'课';b.onclick=()=>show(i);list.appendChild(b);});function show(i){let n=lessons[i].nodes;let box=document.getElementById('nodes');box.innerHTML='';n.forEach(x=>{let d=document.createElement('div');d.textContent=x.title;box.appendChild(d);});}show(0);}load();</script></body></html>
