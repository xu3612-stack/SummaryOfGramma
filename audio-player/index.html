<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>大家的日语文型音频播放器 V3.7</title>

<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#0f172a;color:#f8fafc}
header{position:sticky;top:0;background:#111827;border-bottom:1px solid #334155;padding:14px}
h1{font-size:20px;margin:0}
main{display:grid;grid-template-columns:340px 1fr;gap:14px;padding:14px}
.panel{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}
button,select{background:#0b1220;color:#fff;border:1px solid #334155;padding:10px;border-radius:10px}
.primary{background:#38bdf8;color:#000}
.lessons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.active{outline:2px solid #38bdf8}
.now{margin-bottom:10px}
.nodes{max-height:70vh;overflow:auto}
.node{margin-bottom:8px;padding:10px;background:#1f2937;border-radius:10px}
</style>
</head>

<body>

<header>
<h1>大家的日语文型音频播放器（Structured Only）</h1>
<div id="loadStatus">加载中...</div>
</header>

<main>

<section class="panel">
<select id="lesson"></select>
<button id="play" class="primary">播放</button>
<button id="next">下一条</button>

<div id="lessons" class="lessons"></div>
</section>

<section class="panel">
<div class="now">
<div id="nowTitle"></div>
<div id="nowText"></div>
</div>
<div id="nodes" class="nodes"></div>
</section>

</main>

<script>
var lessons = [];
var li = 0;
var ni = 0;

function $(id){return document.getElementById(id)}

async function fetchJson(path){
  const res = await fetch(path + '?v=' + Date.now());
  if(!res.ok) throw new Error(path + ' 加载失败');
  return res.json();
}

async function loadLessons(){
  try{
    let loaded = [];

    const files = [
      'lessons/structured-01.json',
      'lessons/structured-02.json',
      'lessons/structured-03.json',
      'lessons/structured-04.json'
    ];

    for (let f of files){
      try{
        const data = await fetchJson(f);
        loaded = loaded.concat(data);
      }catch(e){
        console.warn("加载失败:", f);
      }
    }

    lessons = loaded.sort((a,b)=>a.lesson - b.lesson);

    $('loadStatus').innerText = '已加载 ' + lessons.length + ' 课（structured-only）';

  }catch(e){
    console.error(e);
    $('loadStatus').innerText = '加载失败';
  }
}

function init(){
  const sel = $('lesson');
  const box = $('lessons');

  lessons.forEach((l,i)=>{
    const o = document.createElement('option');
    o.value = i;
    o.textContent = '第'+l.lesson+'课';
    sel.appendChild(o);

    const b = document.createElement('button');
    b.textContent = '第'+l.lesson+'课';
    b.onclick = ()=>selectLesson(i);
    box.appendChild(b);
  });

  selectLesson(0);
}

function selectLesson(i){
  li = i;
  ni = 0;
  render();
}

function render(){
  const l = lessons[li];
  $('nowTitle').innerText = l.title;

  const nodes = $('nodes');
  nodes.innerHTML = '';

  l.nodes.forEach((n,i)=>{
    const div = document.createElement('div');
    div.className = 'node';
    div.innerText = n.text;
    div.onclick = ()=>{ni=i; render()}
    nodes.appendChild(div);
  });

  $('nowText').innerText = l.nodes[ni].text;
}

function speak(text, lang){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'zh-CN';
  speechSynthesis.speak(u);
}

function play(){
  const n = lessons[li].nodes[ni];

  (n.audioParts || []).forEach(p=>{
    speak(p.text, p.lang);
  });
}

function next(){
  ni++;
  if(ni >= lessons[li].nodes.length){
    li++;
    ni=0;
  }
  render();
}

$('play').onclick = play;
$('next').onclick = next;

loadLessons().then(init);
</script>

</body>
</html>
