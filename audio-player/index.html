<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>大家的日语文型音频播放器 V2</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#0f172a;color:#f8fafc}header{position:sticky;top:0;background:#111827;border-bottom:1px solid #334155;padding:14px 16px;z-index:2}h1{font-size:20px;margin:0 0 6px}.sub{color:#cbd5e1;font-size:13px}main{display:grid;grid-template-columns:330px 1fr;gap:14px;padding:14px}.panel{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}button,select{border:1px solid #334155;border-radius:12px;background:#0b1220;color:#f8fafc;padding:12px;font-size:15px}button{cursor:pointer;font-weight:650}.primary{background:#38bdf8;color:#00111f;border:0}.good{background:#22c55e;color:#02130a;border:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.lessons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:55vh;overflow:auto}.active{outline:2px solid #38bdf8;background:#083344!important}.now{border-left:4px solid #38bdf8;background:#0b1220;border-radius:12px;padding:12px;margin-bottom:12px}.nowTitle{font-weight:700;margin-bottom:6px}.nowText{white-space:pre-wrap;line-height:1.65;color:#e2e8f0}.nodes{display:flex;flex-direction:column;gap:8px;max-height:68vh;overflow:auto}.node{text-align:left;line-height:1.55;background:#1f2937}.meta{color:#38bdf8;font-size:12px;margin-bottom:4px}.barBox{height:8px;background:#020617;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:#38bdf8}@media(max-width:850px){main{grid-template-columns:1fr}.lessons{grid-template-columns:repeat(4,1fr);max-height:220px}.grid{grid-template-columns:repeat(3,1fr)}}</style></head><body><header><h1>大家的日语文型音频播放器 V2</h1><div class="sub">课程节点｜连续播放｜语速与停顿控制｜适合开车复习</div></header><main><section class="panel"><div class="row"><label>课程</label><select id="lesson"></select></div><div class="row"><label>范围</label><select id="range"><option value="lesson">当前课</option><option value="from">从当前位置一直播放</option><option value="all">全部课程</option></select></div><div class="row"><label>语速</label><select id="rate"><option value=".75">0.75x</option><option value=".9" selected>0.9x</option><option value="1">1.0x</option><option value="1.15">1.15x</option></select><label>停顿</label><select id="pause"><option value="600">0.6秒</option><option value="1200" selected>1.2秒</option><option value="2000">2秒</option></select></div><div class="grid"><button class="good" id="play">播放</button><button id="pauseBtn">暂停/继续</button><button id="stop">停止</button><button id="prev">上一条</button><button class="primary" id="next">下一条</button><button id="repeat">重播</button></div><p class="sub" id="stats"></p><div class="barBox"><div id="bar" class="bar"></div></div><hr style="border-color:#334155"><div id="lessons" class="lessons"></div></section><section class="panel"><div class="now"><div id="nowTitle" class="nowTitle"></div><div id="nowText" class="nowText"></div></div><div id="nodes" class="nodes"></div></section></main><script src="data.js"></script><script>const lessons=window.LESSONS||[{lesson:1,title:'第1课',nodes:(window.data||[]).map((x,i)=>({title:'节点'+(i+1),text:x.text}))}];let li=0,ni=0,q=[],qp=0,playing=false,timer=null;const $=id=>document.getElementById(id);function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function lang(s){return /[ぁ-んァ-ン]/.test(s)?'ja-JP':'zh-CN'}function clean(s){return s.replace(/[•·]/g,'。').replace(/\s+/g,' ').trim()}function chunks(s){return clean(s).split(/(?<=[。！？!?])\s*/).filter(Boolean)}function init(){lessons.forEach((l,i)=>{let o=document.createElement('option');o.value=i;o.textContent=`第${l.lesson}课（${l.nodes.length}节点）`;$('lesson').appendChild(o);let b=document.createElement('button');b.textContent=`第${l.lesson}课`;b.onclick=()=>sel(i,0);$('lessons').appendChild(b)});$('lesson').onchange=()=>sel(+$('lesson').value,0);$('play').onclick=play;$('pauseBtn').onclick=pauser;$('stop').onclick=stop;$('next').onclick=next;$('prev').onclick=prev;$('repeat').onclick=repeat;sel(0,0)}function sel(a,b){li=a;ni=b;$('lesson').value=li;render()}function render(){[...$('lessons').children].forEach((b,i)=>b.classList.toggle('active',i===li));let l=lessons[li];$('nodes').innerHTML='';l.nodes.forEach((n,i)=>{let b=document.createElement('button');b.className='node';b.innerHTML=`<div class="meta">第${l.lesson}课｜${i+1}/${l.nodes.length}</div><div>${esc(n.text)}</div>`;b.onclick=()=>{ni=i;render()};if(i===ni)b.classList.add('active');$('nodes').appendChild(b)});let n=l.nodes[ni];$('nowTitle').textContent=`第${l.lesson}课｜${ni+1}/${l.nodes.length}｜${n.title||''}`;$('nowText').textContent=n.text;$('stats').textContent=`共 ${lessons.length} 课，${lessons.reduce((a,l)=>a+l.nodes.length,0)} 个节点。`;bar();let a=$('nodes').children[ni];if(a)a.scrollIntoView({block:'nearest'})}function buildQ(){let r=$('range').value,out=[];if(r==='lesson')lessons[li].nodes.forEach((_,i)=>out.push([li,i]));else{let start=r==='from'?li:0;for(let L=start;L<lessons.length;L++){let s=(r==='from'&&L===li)?ni:0;for(let i=s;i<lessons[L].nodes.length;i++)out.push([L,i])}}return out}function play(){speechSynthesis.cancel();q=buildQ();qp=0;playing=true;speakNow()}function speakNow(){if(!playing||qp>=q.length){playing=false;return}[li,ni]=q[qp];$('lesson').value=li;render();speakChunks(chunks(lessons[li].nodes[ni].text),0,()=>{if(!playing)return;qp++;timer=setTimeout(speakNow,+$('pause').value)})}function speakChunks(c,i,done){if(i>=c.length){done();return}let u=new SpeechSynthesisUtterance(c[i]);u.lang=lang(c[i]);u.rate=+$('rate').value;u.onend=()=>speakChunks(c,i+1,done);u.onerror=()=>speakChunks(c,i+1,done);speechSynthesis.speak(u)}function pauser(){speechSynthesis.paused?speechSynthesis.resume():speechSynthesis.pause()}function stop(){playing=false;clearTimeout(timer);speechSynthesis.cancel()}function next(){stop();if(ni<lessons[li].nodes.length-1)ni++;else if(li<lessons.length-1){li++;ni=0}render()}function prev(){stop();if(ni>0)ni--;else if(li>0){li--;ni=lessons[li].nodes.length-1}render()}function repeat(){stop();q=[[li,ni]];qp=0;playing=true;speakNow()}function bar(){let total=lessons.reduce((a,l)=>a+l.nodes.length,0),done=lessons.slice(0,li).reduce((a,l)=>a+l.nodes.length,0)+ni+1;$('bar').style.width=Math.round(done/total*100)+'%'}init();</script></body></html>
